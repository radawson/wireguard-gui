{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl app-card">
    <h3 class="mb-4 text-xl font-semibold">Login</h3>
    <form method="POST" action="{{url_for('user.login')}}" class="space-y-4">
        <div>
            <label class="app-label" for="name">User Name</label>
            <input type="text" class="app-input" id="name" name="name">
        </div>
        <div>
            <label class="app-label" for="password">Password</label>
            <input class="app-input" type="password" id="password" name="password">
        </div>
        <label class="inline-flex items-center gap-2 text-sm">
            <input type="checkbox" id="remember" name="remember" checked>
            Remember me
        </label>
        <div>
            <button class="app-btn">Login</button>
        </div>
    </form>
</div>
{%endblock%}

{% block scripts %}

{% endblock %}
