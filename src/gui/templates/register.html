{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl app-card">
    <h2 class="mb-4 text-2xl font-semibold">Register</h2>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="mb-4 rounded bg-red-100 px-4 py-3 text-sm text-red-800">
        {{ messages[0] }}. Go to <a class="underline" href="{{ url_for('user.login') }}">login page</a>.
    </div>
    {% endif %}
    {% endwith %}
    <form method="POST" action="{{url_for('user.register')}}" class="space-y-4">
        <div>
            <label class="app-label" for="name">User Name</label>
            <input type="text" class="app-input" id="name" name="name"/>
        </div>
        <div>
            <label class="app-label" for="email">Email</label>
            <input class="app-input" type="email" id="email" name="email"/>
        </div>
        <div>
            <label class="app-label" for="password">Password</label>
            <input class="app-input" type="password" id="password" name="password"/>
        </div>
        <div>
            <label class="app-label" for="confirm_password">Confirm Password</label>
            <input class="app-input" type="password" id="confirm_password" name="confirm_password"/>
        </div>
        <button class="app-btn">Add user</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
{% if admin %}
<script>
    name_field = document.getElementById('name')
    name_field.value = 'admin';
    name_field.readOnly = true;
</script>
{% endif %}

<script>
    const togglePassword = document.querySelectorAll('.toggle-password');
    togglePassword.forEach((toggle) => {
        toggle.addEventListener('click', () => {
            const passwordField = document.querySelector(toggle.getAttribute('toggle'));
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
            } else {
                passwordField.type = 'password';
            }
        });
    });
</script>

{% endblock %}
